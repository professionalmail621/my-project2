# .github/workflows/ci-cd.yml
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Kilo Code Quality Check
        if: github.event_name == 'pull_request'
        uses: kilocode/kilo-review-action@v1
        with:
          api-key: ${{ secrets.KILO_API_KEY }}
          model: "moonshotai/kimi-k2"

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Kilo Deploy
        uses: kilocode/kilo-deploy-action@v1
        with:
          api-key: ${{ secrets.KILO_API_KEY }}
          project-name: "task-tracker"