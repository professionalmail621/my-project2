# .github/workflows/kilo-review.yml
name: Kilo Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Kilo Code Review
        uses: kilocode/kilo-review-action@v1
        with:
          api-key: ${{ secrets.KILO_API_KEY }}
          model: "moonshotai/kimi-k2"
          review-level: "detailed"